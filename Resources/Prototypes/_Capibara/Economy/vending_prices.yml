# Capibara Economy: Vendor pricing configuration
# Only civilian/consumer vendors have prices.
# Department/work vendors (Security, Medical, Engineering, Science, Cargo) remain FREE.
#
# Maps vending machine entity prototype IDs to their default price in Spesos.
# The CapibaraVendingSystem adds VendingMachinePriceComponent dynamically on MapInit.

- type: vendingPriceConfig
  id: DefaultVendingPrices
  vendorPrices:
    # Food & Drink vendors
    VendingMachineCola: 5
    VendingMachineCoffee: 5
    VendingMachineSnack: 5
    VendingMachineDonut: 5
    # Cigarettes & Luxury
    VendingMachineCigs: 8
