# Capibara - Shadow Monarch mobs

# Shadow Soldier - balanced type (60HP, Slash 12 + Cold 3)
- type: entity
  id: MobShadowSoldier
  parent: [ BaseMob, MobCombat ]
  name: shadow-monarch-soldier-entity-name
  description: shadow-monarch-soldier-entity-desc
  components:
  - type: ShadowSoldier
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NpcFactionMember
    factions:
    - ShadowMonarch
  - type: MovementSpeedModifier
    baseWalkSpeed: 4.5
    baseSprintSpeed: 4.5
  - type: Sprite
    drawdepth: Mobs
    sprite: _Capibara/ShadowMonarch/Mobs/shadow_soldier.rsi
    layers:
      - state: shadow_soldier
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 12
        Cold: 3
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      60: Dead
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 60
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: Damageable
    damageContainer: Biological
  - type: Pullable
  - type: ZombieImmune
  - type: CombatMode
    isInCombatMode: true
  - type: PointLight
    radius: 2
    energy: 1.5
    color: "#4B0082"
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 60
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]

