# Shadow Mage - ranged type (40HP, ranged shadow bolt, fragile)
- type: entity
  id: MobShadowMage
  parent: [ BaseMob, MobCombat ]
  name: shadow-monarch-mage-entity-name
  description: shadow-monarch-mage-entity-desc
  components:
  - type: ShadowSoldier
  - type: HTN
    rootTask:
      task: SimpleRangedHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NpcFactionMember
    factions:
    - ShadowMonarch
  - type: MovementSpeedModifier
    baseWalkSpeed: 4.5
    baseSprintSpeed: 4.5
  - type: Sprite
    drawdepth: Mobs
    sprite: _Capibara/ShadowMonarch/Mobs/shadow_mage.rsi
    layers:
      - state: shadow_mage
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 2
  - type: BasicEntityAmmoProvider
    proto: BulletShadowBolt
    capacity: 1
    count: 1
  - type: Gun
    fireRate: 0.5
    useKey: false
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot: /Audio/Effects/Lightning/lightningbolt.ogg
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      40: Dead
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: Damageable
    damageContainer: Biological
  - type: Pullable
  - type: ZombieImmune
  - type: CombatMode
    isInCombatMode: true
  - type: PointLight
    radius: 2
    energy: 1.5
    color: "#6A0DAD"
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 40
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]

# Shadow Bolt projectile (Mage ranged attack)
- type: entity
  id: BulletShadowBolt
  name: shadow bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: bullet
      shader: unshaded
      color: "#4B0082"
  - type: PointLight
    radius: 1.5
    energy: 2
    color: "#4B0082"
  - type: Projectile
    damage:
      types:
        Cold: 8
        Shock: 4

# Domain darkness effect entity
- type: entity
  id: ShadowDomainEffect
  name: shadow domain
  description: An oppressive zone of darkness.
  categories: [ HideSpawnMenu ]
  components:
  - type: ShadowDomain
  - type: Transform
    anchored: true
  - type: PointLight
    radius: 5
    energy: -10
    color: "#1a001a"
  - type: TimedDespawn
    lifetime: 15
