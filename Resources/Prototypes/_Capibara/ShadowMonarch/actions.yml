# Capibara - Shadow Monarch actions

- type: entity
  parent: BaseAction
  id: ActionShadowExtractSoldier
  name: action-shadow-extract-soldier
  description: action-shadow-extract-soldier-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 10
    icon:
      sprite: _Capibara/ShadowMonarch/abilities.rsi
      state: extraction
  - type: TargetAction
    range: 1.5
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:ShadowExtractSoldierEvent {}

