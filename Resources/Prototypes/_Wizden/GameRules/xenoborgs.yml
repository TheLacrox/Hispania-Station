# Xenoborg game rules - ported from Wizden SS14
- type: entity
  parent: BaseGameRule
  id: BaseXenoborgsRule
  abstract: true
  components:
  - type: XenoborgsRule
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/Shuttles/mothership.yml

- type: entity
  parent: BaseXenoborgsRule
  id: Xenoborgs
  components:
  - type: GameRule
    minPlayers: 2
  - type: AntagMultipleRoleSpawner
    antagRoleToPrototypes:
      MothershipCore: [ MothershipCore ]
      Xenoborg: [ XenoborgEngi, XenoborgHeavy, XenoborgScout, XenoborgStealth ]
    pickAndTake: true
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ MothershipCore ]
      fallbackRoles: [ Xenoborg ]
      spawnerPrototype: SpawnPointGhostRoleMothershipCore
      mindRoles:
      - MindRoleMothershipCore
    - prefRoles: [ Xenoborg ]
      fallbackRoles: [ MothershipCore ]
      spawnerPrototype: SpawnPointGhostRoleXenoborg
      mindRoles:
      - MindRoleXenoborg
      min: 4
      max: 4

- type: entity
  parent: BaseXenoborgsRule
  id: SubXenoborgs
  components:
  - type: GameRule
    minPlayers: 2
    cancelPresetOnTooFewPlayers: false
  - type: AntagMultipleRoleSpawner
    antagRoleToPrototypes:
      MothershipCore: [ MothershipCore ]
      Xenoborg: [ XenoborgEngi, XenoborgHeavy, XenoborgScout, XenoborgStealth ]
    pickAndTake: true
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ MothershipCore ]
      fallbackRoles: [ Xenoborg ]
      spawnerPrototype: SpawnPointGhostRoleMothershipCore
      mindRoles:
      - MindRoleMothershipCore
    - prefRoles: [ Xenoborg ]
      fallbackRoles: [ MothershipCore ]
      spawnerPrototype: SpawnPointGhostRoleXenoborg
      mindRoles:
      - MindRoleXenoborg
      min: 4
      max: 4
