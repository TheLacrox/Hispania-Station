# Xenoborg doors - ported from Wizden SS14
- type: entity
  parent: Airlock
  id: AirlockXenoborg
  name: xenoborg airlock
  components:
  - type: Sprite
    sprite: Structures/Doors/Airlocks/Standard/xenoborg.rsi

- type: entity
  parent: AirlockXenoborg
  id: AirlockXenoborgLocked
  suffix: Xenoborg, Locked
  components:
  - type: StationAiWhitelist
    enabled: false
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsXenoborg ]

- type: entity
  parent: AirlockShuttle
  id: AirlockShuttleXenoborg
  components:
  - type: Sprite
    sprite: Structures/Doors/Airlocks/Standard/shuttle_xenoborg.rsi

- type: entity
  parent: AirlockShuttleXenoborg
  id: AirlockGlassShuttleXenoborgLocked
  suffix: External, Docking, Xenoborg, Locked
  components:
  - type: StationAiWhitelist
    enabled: false
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsXenoborg ]

- type: entity
  parent: BlastDoor
  id: BlastDoorXenoborg
  name: xenoborg blast door
  description: Don't lose a head!
  components:
  - type: Sprite
    sprite: Structures/Doors/Shutters/xenoborg_blastdoor.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Door
    closeTimeOne: 0.4
    closeTimeTwo: 0.7
    openTimeOne: 0.4
    openTimeTwo: 0.7
    openingAnimationTime: 1.1
    closingAnimationTime: 1.0
    canPry: false
    crushDamage:
      types:
        Blunt: 25

- type: entity
  parent: BlastDoorXenoborg
  id: BlastDoorXenoborgOpen
  suffix: Open
  components:
  - type: Door
    state: Open
  - type: Occluder
    enabled: false
  - type: Physics
    canCollide: false
  - type: Airtight
    airBlocked: false
  - type: RadiationBlocker
    enabled: false
