# Ghost role spawners for xenoborgs on the mothership shuttle
- type: entity
  categories: [ Spawner ]
  parent: BaseAntagSpawner
  id: SpawnPointGhostRoleMothershipCore
  components:
  - type: Tag
    tags:
    - ForceFixRotations
    - MothershipCoreGhostrole
  - type: GhostRole
    name: ghost-role-information-mothership-core-name
    description: ghost-role-information-mothership-core-desc
    rules: ghost-role-information-silicon-rules
    mindRoles:
    - MindRoleMothershipCore
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Mobs/Silicon/mothership_core.rsi
      state: core-idle

- type: entity
  categories: [ HideSpawnMenu, Spawner ]
  parent: BaseAntagSpawner
  id: SpawnPointGhostRoleXenoborg
  components:
  - type: Tag
    tags:
    - ForceFixRotations
    - XenoborgGhostrole
  - type: GhostRole
    name: ghost-role-information-xenoborg-name
    description: ghost-role-information-xenoborg-desc
    rules: ghost-role-information-silicon-rules
    mindRoles:
    - MindRoleXenoborg
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Mobs/Silicon/chassis.rsi
      state: xenoborg_engi

# Grid spawn points used in the mothership map
- type: entity
  id: SpawnPointMothershipCore
  parent: MarkerBase
  name: mothership core
  components:
  - type: GridSpawnPointWhitelist
    whitelist:
      components:
      - MothershipCore
      tags:
      - MothershipCoreGhostrole
  - type: SpawnPoint
  - type: Sprite
    layers:
    - state: green
    - sprite: Mobs/Silicon/mothership_core.rsi
      state: core-idle

- type: entity
  id: SpawnPointXenoborg
  parent: MarkerBase
  name: xenoborgs
  components:
  - type: GridSpawnPointWhitelist
    whitelist:
      components:
      - Xenoborg
      tags:
      - XenoborgGhostrole
    blacklist:
      components:
      - MothershipCore
      tags:
      - MothershipCoreGhostrole
  - type: SpawnPoint
  - type: Sprite
    layers:
    - state: green
    - sprite: Mobs/Silicon/chassis.rsi
      state: xenoborg_heavy
