# Capibara Station - Docker Compose
# Provides Redis for the TTS system (and future services).
#
# Usage:
#   docker compose up -d     # Start services
#   docker compose down      # Stop services
#
# Configure the server to connect:
#   cvar tts.enabled true
#   cvar tts.connection_string 127.0.0.1:6380

services:
  redis:
    image: redis:latest
    ports:
      - "6380:6379"
    restart: unless-stopped
